<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HueProTab</title>
    <style>
/* src/css/base.css */
* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #121933, var(--bg) 62%);
  color: var(--text);
}

body {
  padding: 24px;
}

h1,
h2,
h3,
p {
  margin-top: 0;
}

p {
  color: var(--muted);
}

/* src/css/components/cards.css */
.panel,
.card,
.dashboard-section {
  border: 1px solid var(--panel-border);
  border-radius: var(--radius);
  background: rgba(21, 29, 51, 0.88);
  box-shadow: var(--shadow);
}

.panel {
  padding: 24px;
}

.dashboard-section,
.card {
  padding: 18px;
}

/* src/css/components/color-picker.css */
.color-picker-placeholder {
  min-height: 44px;
  border-radius: 999px;
  border: 1px dashed var(--panel-border);
  background: linear-gradient(90deg, #ff4d6d, #ffd166, #2dd4bf, #60a5fa, #a78bfa);
}

/* src/css/components/controls.css */
button,
input,
select {
  font: inherit;
}

button {
  border: 0;
  border-radius: 999px;
  padding: 10px 14px;
  background: var(--accent);
  color: white;
}

.topbar-button {
  border: 1px solid transparent;
  background: var(--accent);
  color: white;
}

.topbar-button-secondary {
  border-color: var(--panel-border);
  background: var(--panel-muted);
  color: var(--text);
}

.topbar-button:focus-visible {
  outline: 2px solid var(--focus-ring);
  outline-offset: 2px;
}

/* src/css/layout.css */
.app-shell {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  gap: 20px;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.topbar-actions {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  flex-wrap: wrap;
  gap: 10px;
}

.eyebrow {
  text-transform: uppercase;
  letter-spacing: 0.18em;
  font-size: 0.75rem;
}

.status-pill {
  margin: 0;
  padding: 10px 14px;
  border-radius: 999px;
  background: var(--accent-soft);
  color: var(--text);
}

.panel-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}

.setup-summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin: 20px 0 0;
}

.setup-summary div {
  padding: 14px;
  border-radius: 14px;
  border: 1px solid var(--panel-border);
  background: rgba(255, 255, 255, 0.02);
}

.setup-summary dt {
  margin-bottom: 6px;
  font-size: 0.8rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
}

.setup-summary dd {
  margin: 0;
  font-weight: 600;
}

.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
}

@media (max-width: 640px) {
  body {
    padding: 16px;
  }

  .topbar,
  .panel-header {
    align-items: flex-start;
    flex-direction: column;
  }

  .topbar-actions {
    justify-content: flex-start;
  }
}

/* src/css/tokens.css */
:root {
  color-scheme: dark;
  --bg: #0b1020;
  --panel: #151d33;
  --panel-border: #28324f;
  --panel-muted: #1e2742;
  --text: #edf2ff;
  --muted: #9aa8c7;
  --accent: #7c3aed;
  --accent-soft: rgba(124, 58, 237, 0.18);
  --focus-ring: #c4b5fd;
  --radius: 18px;
  --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
}
</style>
  </head>
  <body data-app="hueprotab">
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">HueProTab</p>
          <h1>Dashboard control shell</h1>
        </div>
        <div class="topbar-actions">
          <p class="status-pill" data-build-status>Bridge offline</p>
          <button type="button" class="topbar-button topbar-button-secondary" data-action="refresh">Refresh</button>
          <button type="button" class="topbar-button" data-action="settings">Settings</button>
        </div>
      </header>
      <main id="app-root"></main>
    </div>
    <template data-template="components/light-card">
<article class="card light-card">
  <h3>Light card</h3>
  <p>Per-light power, brightness, and color controls will render here.</p>
</article>
</template>

<template data-template="components/quick-access">
<article class="card quick-access-card">
  <h3>Quick Access tile</h3>
  <p>Pinned lights, rooms, scenes, and quick actions will render here.</p>
</article>
</template>

<template data-template="components/room-card">
<article class="card room-card">
  <h3>Room card</h3>
  <p>Room and zone state, scene chips, and group controls will render here.</p>
</article>
</template>

<template data-template="components/scene-card">
<article class="card scene-card">
  <h3>Scene card</h3>
  <p>Scene activation and favorites will render here.</p>
</article>
</template>

<template data-template="views/dashboard">
<section class="panel panel-dashboard" data-view="dashboard">
  <div class="panel-header">
    <div>
      <h2>Dashboard</h2>
      <p data-dashboard-summary>0 rooms • 0 lights (0 on) • 0 scenes</p>
    </div>
  </div>
  <div class="dashboard-grid" data-dashboard-grid>
    <section class="dashboard-section" data-section="quick-access"><h3>Quick Access</h3></section>
    <section class="dashboard-section" data-section="rooms"><h3>Rooms</h3></section>
    <section class="dashboard-section" data-section="lights"><h3>Lights</h3></section>
    <section class="dashboard-section" data-section="scenes"><h3>Scenes</h3></section>
  </div>
</section>
</template>

<template data-template="views/settings">
<section class="panel panel-settings" data-view="settings">
  <h2>Settings skeleton</h2>
  <p>Preferences, hidden sections, favorites, and bridge recovery will live here.</p>
</section>
</template>

<template data-template="views/setup">
<section class="panel panel-setup" data-view="setup">
  <h2>Bridge setup</h2>
  <p>Discover or enter a Hue bridge, then pair once and save it to this device.</p>
  <dl class="setup-summary">
    <div>
      <dt>Bridge</dt>
      <dd data-bridge-name>No bridge selected</dd>
    </div>
    <div>
      <dt>IP address</dt>
      <dd data-bridge-ip>Manual entry required</dd>
    </div>
    <div>
      <dt>Discovery source</dt>
      <dd data-discovery-source>unknown</dd>
    </div>
    <div>
      <dt>Pairing status</dt>
      <dd data-pairing-status>idle</dd>
    </div>
  </dl>
</section>
</template>
    <script>
// src/js/app.js
(function bootstrapHueProTab(global) {
  const app = global.HueProTab || {};
  const root = document.querySelector('#app-root');
  const status = document.querySelector('[data-build-status]');

  if (!root || !status) {
    return;
  }

  const orderedViews = (app.config?.views ?? []).map((name) => {
    return document.querySelector(`template[data-template="${name}"]`)?.innerHTML ?? '';
  });

  root.innerHTML = orderedViews.join('\n');

  const discoveryResult = app.services?.discovery?.discover() || { bridges: [] };
  const bridge = discoveryResult.bridges?.[0] || null;
  const pairingResult = app.services?.pairing?.begin({ bridge, appName: app.config?.appName }) || { status: 'idle' };
  const snapshotResult = app.services?.hueClient?.fetchSnapshot({ bridge }) || { summary: app.state?.snapshotSummary };
  const state = app.updateHuePlatformState?.({ discoveryResult, pairingResult, snapshotResult }) || app.state;

  const bridgeNameNode = root.querySelector('[data-bridge-name]');
  const bridgeIpNode = root.querySelector('[data-bridge-ip]');
  const discoverySourceNode = root.querySelector('[data-discovery-source]');
  const pairingStatusNode = root.querySelector('[data-pairing-status]');
  const dashboardSummaryNode = root.querySelector('[data-dashboard-summary]');

  if (bridgeNameNode) {
    bridgeNameNode.textContent = state.setup.bridgeName;
  }

  if (bridgeIpNode) {
    bridgeIpNode.textContent = state.setup.bridgeIp;
  }

  if (discoverySourceNode) {
    discoverySourceNode.textContent = state.setup.discoverySource;
  }

  if (pairingStatusNode) {
    pairingStatusNode.textContent = state.setup.pairingStatus;
  }

  if (dashboardSummaryNode) {
    dashboardSummaryNode.textContent = `${state.snapshotSummary.roomCount} rooms • ${state.snapshotSummary.lightCount} lights (${state.snapshotSummary.lightsOn} on) • ${state.snapshotSummary.sceneCount} scenes`;
  }

  status.textContent = `${state.setup.bridgeName} ready • ${state.snapshotSummary.lightCount} lights loaded`;
})(typeof window !== 'undefined' ? window : globalThis);

// src/js/config.js
(function initConfig(global) {
  const app = global.HueProTab = global.HueProTab || {};
  app.config = {
    appName: 'HueProTab',
    views: ['views/setup', 'views/dashboard', 'views/settings'],
    bridgeDiscoveryTimeoutMs: 5000,
    demoBridge: {
      id: 'bridge-demo-001',
      name: 'Living Room Bridge',
      ip: '192.168.1.25',
      model: 'Philips Hue Bridge v2'
    },
    demoSnapshot: {
      lights: [
        {
          id: 'light-lamp-left',
          name: 'Sofa Lamp',
          roomId: 'room-living',
          on: true,
          brightness: 82,
          colorMode: 'color',
          colorLabel: 'Sunset amber'
        },
        {
          id: 'light-lamp-right',
          name: 'Desk Strip',
          roomId: 'room-living',
          on: true,
          brightness: 64,
          colorMode: 'scene',
          colorLabel: 'Aurora blend'
        },
        {
          id: 'light-bedside',
          name: 'Bedside Orb',
          roomId: 'room-bedroom',
          on: false,
          brightness: 20,
          colorMode: 'temperature',
          colorLabel: 'Warm relax'
        }
      ],
      rooms: [
        {
          id: 'room-living',
          name: 'Living Room',
          lightIds: ['light-lamp-left', 'light-lamp-right'],
          sceneIds: ['scene-focus', 'scene-party']
        },
        {
          id: 'room-bedroom',
          name: 'Bedroom',
          lightIds: ['light-bedside'],
          sceneIds: ['scene-sleep']
        }
      ],
      scenes: [
        {
          id: 'scene-focus',
          name: 'Focus',
          roomId: 'room-living'
        },
        {
          id: 'scene-party',
          name: 'Party Pulse',
          roomId: 'room-living'
        },
        {
          id: 'scene-sleep',
          name: 'Sleep',
          roomId: 'room-bedroom'
        }
      ]
    }
  };
})(typeof window !== 'undefined' ? window : globalThis);

// src/js/services/discovery.js
(function initDiscovery(global) {
  const app = global.HueProTab = global.HueProTab || {};
  app.services = app.services || {};

  function normalizeBridgeIp(ip) {
    return String(ip || '').trim();
  }

  function createDiscoveryResult({ bridge, source, manualEntry = false }) {
    return {
      status: bridge ? 'found' : 'not-found',
      source,
      manualEntry,
      bridges: bridge ? [bridge] : []
    };
  }

  app.services.discovery = {
    normalizeBridgeIp,
    discover(options = {}) {
      const manualIp = normalizeBridgeIp(options.manualIp);
      const fallbackBridge = app.config?.demoBridge || null;

      if (manualIp) {
        return createDiscoveryResult({
          bridge: {
            ...fallbackBridge,
            id: `manual-${manualIp.replace(/\./g, '-')}`,
            ip: manualIp,
            name: `${fallbackBridge?.name || 'Hue Bridge'} (manual)`
          },
          source: 'manual',
          manualEntry: true
        });
      }

      if (fallbackBridge) {
        return createDiscoveryResult({
          bridge: fallbackBridge,
          source: 'demo-discovery'
        });
      }

      return createDiscoveryResult({ bridge: null, source: 'unavailable' });
    }
  };
})(typeof window !== 'undefined' ? window : globalThis);

// src/js/services/hue-client.js
(function initHueClient(global) {
  const app = global.HueProTab = global.HueProTab || {};
  app.services = app.services || {};

  function cloneSnapshot(snapshot) {
    return JSON.parse(JSON.stringify(snapshot || { lights: [], rooms: [], scenes: [] }));
  }

  function summarizeSnapshot(snapshot) {
    const lightsOn = snapshot.lights.filter((light) => light.on).length;
    return {
      lightCount: snapshot.lights.length,
      lightsOn,
      roomCount: snapshot.rooms.length,
      sceneCount: snapshot.scenes.length
    };
  }

  app.services.hueClient = {
    cloneSnapshot,
    summarizeSnapshot,
    fetchSnapshot(options = {}) {
      const bridge = options.bridge || null;
      if (!bridge) {
        return {
          status: 'bridge-required',
          bridge: null,
          lights: [],
          rooms: [],
          scenes: [],
          summary: summarizeSnapshot({ lights: [], rooms: [], scenes: [] })
        };
      }

      const snapshot = cloneSnapshot(options.snapshot || app.config?.demoSnapshot);
      return {
        status: 'ready',
        bridge,
        ...snapshot,
        summary: summarizeSnapshot(snapshot)
      };
    }
  };
})(typeof window !== 'undefined' ? window : globalThis);

// src/js/services/pairing.js
(function initPairing(global) {
  const app = global.HueProTab = global.HueProTab || {};
  app.services = app.services || {};

  function buildAppKey(bridgeId, appName) {
    return `${String(appName || 'hueprotab').toLowerCase()}-${String(bridgeId || 'bridge').replace(/[^a-z0-9]+/gi, '').toLowerCase()}`;
  }

  app.services.pairing = {
    buildAppKey,
    begin(options = {}) {
      const bridge = options.bridge || null;
      if (!bridge) {
        return {
          status: 'bridge-required',
          instruction: 'Find or enter a bridge IP before pairing can begin.'
        };
      }

      if (options.simulateButtonPress === false) {
        return {
          status: 'awaiting-button-press',
          bridge,
          instruction: 'Press the bridge button, then retry pairing within 30 seconds.'
        };
      }

      const appName = options.appName || app.config?.appName || 'HueProTab';
      return {
        status: 'linked',
        bridge,
        appName,
        appKey: buildAppKey(bridge.id, appName),
        linkedAt: 'demo-linked-now'
      };
    }
  };
})(typeof window !== 'undefined' ? window : globalThis);

// src/js/state/preferences.js
window.HueProTab = window.HueProTab || {};
window.HueProTab.preferences = {
  hiddenSections: [],
  pinnedItems: []
};

// src/js/state/store.js
(function initStateStore(global) {
  const app = global.HueProTab = global.HueProTab || {};

  app.state = {
    buildStage: 'foundation',
    bridgeStatus: 'unpaired',
    setup: {
      discoverySource: 'unknown',
      bridgeName: 'No bridge selected',
      bridgeIp: 'Manual entry required',
      pairingStatus: 'idle'
    },
    snapshotSummary: {
      lightCount: 0,
      lightsOn: 0,
      roomCount: 0,
      sceneCount: 0
    }
  };

  app.updateHuePlatformState = function updateHuePlatformState({ discoveryResult, pairingResult, snapshotResult }) {
    const bridge = pairingResult?.bridge || discoveryResult?.bridges?.[0] || null;

    app.state.bridgeStatus = pairingResult?.status || discoveryResult?.status || 'unpaired';
    app.state.setup = {
      discoverySource: discoveryResult?.source || 'unknown',
      bridgeName: bridge?.name || 'No bridge selected',
      bridgeIp: bridge?.ip || 'Manual entry required',
      pairingStatus: pairingResult?.status || 'idle'
    };
    app.state.snapshotSummary = snapshotResult?.summary || app.state.snapshotSummary;

    return app.state;
  };
})(typeof window !== 'undefined' ? window : globalThis);

// src/js/ui/components/color-picker.js
window.HueProTab = window.HueProTab || {};
window.HueProTab.ui = window.HueProTab.ui || {};
window.HueProTab.ui.components = window.HueProTab.ui.components || {};
window.HueProTab.ui.components.colorPicker = 'foundation-placeholder';

// src/js/ui/components/light-card.js
window.HueProTab = window.HueProTab || {};
window.HueProTab.ui = window.HueProTab.ui || {};
window.HueProTab.ui.components = window.HueProTab.ui.components || {};
window.HueProTab.ui.components.lightCard = 'template:data-template="components/light-card"';

// src/js/ui/components/quick-access.js
window.HueProTab = window.HueProTab || {};
window.HueProTab.ui = window.HueProTab.ui || {};
window.HueProTab.ui.components = window.HueProTab.ui.components || {};
window.HueProTab.ui.components.quickAccess = 'template:data-template="components/quick-access"';

// src/js/ui/components/room-card.js
window.HueProTab = window.HueProTab || {};
window.HueProTab.ui = window.HueProTab.ui || {};
window.HueProTab.ui.components = window.HueProTab.ui.components || {};
window.HueProTab.ui.components.roomCard = 'template:data-template="components/room-card"';

// src/js/ui/components/scene-card.js
window.HueProTab = window.HueProTab || {};
window.HueProTab.ui = window.HueProTab.ui || {};
window.HueProTab.ui.components = window.HueProTab.ui.components || {};
window.HueProTab.ui.components.sceneCard = 'template:data-template="components/scene-card"';

// src/js/ui/render-dashboard.js
window.HueProTab = window.HueProTab || {};
window.HueProTab.ui = window.HueProTab.ui || {};
window.HueProTab.ui.renderDashboard = function renderDashboard() {
  return document.querySelector('template[data-template="views/dashboard"]')?.innerHTML ?? '';
};

// src/js/ui/render-setup.js
window.HueProTab = window.HueProTab || {};
window.HueProTab.ui = window.HueProTab.ui || {};
window.HueProTab.ui.renderSetup = function renderSetup() {
  return document.querySelector('template[data-template="views/setup"]')?.innerHTML ?? '';
};

// src/js/ui/router.js
window.HueProTab = window.HueProTab || {};
window.HueProTab.ui = window.HueProTab.ui || {};
window.HueProTab.ui.router = {
  viewOrder: ['views/setup', 'views/dashboard', 'views/settings'],
  activeView: 'views/dashboard',
  setActiveView(viewName) {
    if (!this.viewOrder.includes(viewName)) {
      return this.activeView;
    }

    this.activeView = viewName;
    return this.activeView;
  }
};
</script>
